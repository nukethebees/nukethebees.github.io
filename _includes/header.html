<header>
  <div class="header-links">
    <a href="/">
      {{ site.title }}
    </a>
  </div>
  <div>
  <nav class="dropdown" data-align="right">
    <button class="dropdown_button">
      Categories
    </button>
    <ul class="dropdown_menu">
      {% for link in site.data.header_links %}
      <li
        class="dropdown_element"
        style="--i: {{ forloop.index0 }};"><a href="{{ link.url }}">{{ link.title }}</a></li>
      {% endfor %}
    </ul>
  </nav>
  </div>
</header>
