---
layout: base
---
<article class="post">
  <div class="post-content">
    <h1>
      {{ page.title }}
    </h1>
    {% if page.last_updated %}
    <time datetime="{{ page.last_updated | date_to_xmlschema }}">
      Last updated: {{ page.last_updated | date: "%B %d, %Y" }}
    </time>
    {% endif %}

    {{ content }}
  </div>
</article>
